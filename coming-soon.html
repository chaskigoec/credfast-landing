<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CREDFAST — Próximamente</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;800&family=Inter:wght@300;400&display=swap" onload="this.onload=null;this.rel='stylesheet'" />
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;800&family=Inter:wght@300;400&display=swap" /></noscript>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #080808;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
      overflow: hidden;
    }

    /* ── Fondo: auto de lujo ── */
    .bg {
      position: fixed;
      inset: 0;
      background:
        url('https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?w=1920&auto=format&q=80')
        center / cover no-repeat;
      filter: grayscale(100%) brightness(0.22);
      z-index: 0;
    }

    /* ── Grid fino encima ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 72px 72px;
      z-index: 1;
      pointer-events: none;
    }

    /* ── Degradado inferior para texto ── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: linear-gradient(to top, rgba(8,8,8,0.85) 0%, transparent 60%);
      z-index: 2;
      pointer-events: none;
    }

    /* ── Contenido encima de todo ── */
    .cs-logo, h1, p { position: relative; z-index: 3; }

    /* Logo: invertir colores para texto blanco, screen para quitar el fondo blanco */
    .cs-logo {
      width: min(440px, 78vw);
      height: auto;
      margin-bottom: 44px;
      filter: invert(1);
      mix-blend-mode: screen;
    }

    h1 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(13px, 2.2vw, 20px);
      font-weight: 400;
      letter-spacing: 0.42em;
      text-transform: uppercase;
      color: #909090;
      margin-bottom: 28px;
    }

    p {
      font-size: 11px;
      font-weight: 300;
      color: #505050;
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <img class="cs-logo" src="logo.png" width="1186" height="270" alt="CREDFAST" />
  <h1>Sitio en construcción.</h1>
  <p>Volvemos pronto &mdash; info@credfast.ec</p>
</body>
</html>
